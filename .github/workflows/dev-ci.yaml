name: Development CI

on:
  pull_request:
    branches:
      - develop
    paths-ignore:
      - '/README.md'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Run Linting
        run: npm run lint

      - name: Build Project
        run: npm run build
